server {
    listen 80;
    server_name apps.youvape.fr;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    # Taille max des uploads (PJ SAV, etc.)
    client_max_body_size 30M;

    # API → backend
    location /api/ {
        proxy_pass http://youvape_backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (import Zendesk) : pas de buffering, connexion longue tenue.
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Assets versionnés par Vite (hash dans le nom de fichier) → cache long immuable.
    # Sûr : chaque build génère de nouveaux noms, donc jamais de version périmée servie.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Frontend React (SPA). index.html et le fallback ne sont JAMAIS mis en cache
    # (revalidation à chaque chargement) : après un déploiement, le navigateur récupère
    # immédiatement le nouveau index.html qui pointe vers les nouveaux bundles.
    # → plus besoin de Cmd+R pour voir les nouveautés.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    location = /robots.txt {
        add_header Content-Type text/plain;
    }
}
