<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { 
      font-family: Arial, sans-serif;
      margin: 0; 
      padding: 8px 12px;
      background: #f8f9fa;
    }
    .topbar-container {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 13px;
    }
    .badge {
      background: #d93f4c;
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="topbar-container">
    <div class="badge">DOUBLON</div>
    <span>Client: Pierre Merle</span>
    <span>Commande: #12345</span>
    <span>Livraison: En transit</span>
  </div>
  
  <script src="https://static.zdassets.com/zendesk_app_framework_sdk/2.0/zaf_sdk.min.js"></script>
  <script>
    var client = ZAFClient.init();
    client.invoke('resize', { width: '100%', height: '40px' });
  </script>
</body>
</html>
